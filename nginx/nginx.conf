upstream drone_service {
    server drone-service:8001;
}

upstream mission_service {
    server mission-service:8002;
}

server {
    listen 80;

    # Route drone requests to drone-service
    location /api/drones/ {
        proxy_pass http://drone_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Route mission and system requests to mission-service
    location /api/missions/ {
        proxy_pass http://mission_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    location /api/system/ {
        proxy_pass http://mission_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
