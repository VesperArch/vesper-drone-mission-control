version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: vesper_db_prod
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - vesper_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vesper_backend_prod
    env_file: .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - POSTGRES_HOST=db
      - DEBUG=False
    ports:
      - "8000:8000"
    networks:
      - vesper_net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/status/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vesper_frontend_prod
    env_file: .env
    ports:
      - "5173:5173"
    networks:
      - vesper_net
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

networks:
  vesper_net:
    driver: bridge

volumes:
  postgres_data_prod:
