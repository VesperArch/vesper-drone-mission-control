version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vesper_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=True
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - vesper_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vesper_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    networks:
      - vesper_net
    depends_on:
      - backend

networks:
  vesper_net:
    driver: bridge
