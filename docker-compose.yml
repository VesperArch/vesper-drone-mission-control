version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Vesper Drone Mission Control — Microservices Architecture
#
# Services:
#   db-drones      → PostgreSQL for drone-service
#   db-missions    → PostgreSQL for mission-service
#   drone-service  → Django REST (port 8001) — drone fleet management
#   mission-service→ Django REST (port 8002) — mission lifecycle + all GoF patterns
#   nginx          → API Gateway (port 8000) — routes /api/drones/ and /api/missions/
#   frontend       → React 18 + Vite (port 5173)
#
# Inter-service communication:
#   mission-service → drone-service via HTTP (HttpDroneRepository)
#   All external traffic enters through nginx on port 8000
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Databases ────────────────────────────────────────────────────────────────

  db-drones:
    image: postgres:16-alpine
    container_name: vesper_db_drones
    environment:
      POSTGRES_DB: ${DRONE_DB_NAME:-vesper_drones}
      POSTGRES_USER: ${DRONE_DB_USER:-vesper}
      POSTGRES_PASSWORD: ${DRONE_DB_PASSWORD}
    volumes:
      - postgres_drones:/var/lib/postgresql/data
    networks:
      - vesper_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DRONE_DB_USER:-vesper} -d ${DRONE_DB_NAME:-vesper_drones}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-missions:
    image: postgres:16-alpine
    container_name: vesper_db_missions
    environment:
      POSTGRES_DB: ${MISSION_DB_NAME:-vesper_missions}
      POSTGRES_USER: ${MISSION_DB_USER:-vesper}
      POSTGRES_PASSWORD: ${MISSION_DB_PASSWORD}
    volumes:
      - postgres_missions:/var/lib/postgresql/data
    networks:
      - vesper_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MISSION_DB_USER:-vesper} -d ${MISSION_DB_NAME:-vesper_missions}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Microservices ─────────────────────────────────────────────────────────────

  drone-service:
    build:
      context: ./services/drone-service
      dockerfile: Dockerfile
    container_name: vesper_drone_service
    env_file: .env
    environment:
      - DEBUG=True
      - DRONE_DB_HOST=db-drones
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,drone-service
    ports:
      - "8001:8001"
    volumes:
      - ./services/drone-service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_drones &&
             python manage.py runserver 0.0.0.0:8001"
    networks:
      - vesper_net
    depends_on:
      db-drones:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/api/drones/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mission-service:
    build:
      context: ./services/mission-service
      dockerfile: Dockerfile
    container_name: vesper_mission_service
    env_file: .env
    environment:
      - DEBUG=True
      - MISSION_DB_HOST=db-missions
      - DRONE_SERVICE_URL=http://drone-service:8001
    ports:
      - "8002:8002"
    volumes:
      - ./services/mission-service:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8002"
    networks:
      - vesper_net
    depends_on:
      db-missions:
        condition: service_healthy
      drone-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/api/system/status/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── API Gateway ───────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: vesper_gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vesper_net
    depends_on:
      drone-service:
        condition: service_healthy
      mission-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep nginx > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vesper_frontend
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vesper_net
    depends_on:
      nginx:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  vesper_net:
    driver: bridge

volumes:
  postgres_drones:
  postgres_missions:
